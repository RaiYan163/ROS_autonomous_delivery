finalproj_joy_controller:
  ros__parameters:
    arm_joints: ["joint1", "joint2", "joint3", "joint4"]
    # Matches ROBOTIS open_manipulator_x/initial_positions.yaml (home step) used at hardware bringup.
    default_arm_positions: [0.0, -1.0, 1.0, 0.0]
    gripper_joints: ["gripper_left_joint", "gripper_right_joint_mimic"]

    select_joint_buttons: [0, 1, 2, 3]
    selected_joint_axis: 1
    dpad_horizontal_axis: 4
    dpad_vertical_axis: 5
    deadzone: 0.18
    joint_velocity_scale: 0.30
    gripper_hold_rate: 0.55
    direct_publish_rate: 50.0
    motion_point_duration: 2.0
    home_duration: 4.0

    base_frame: "world"
    ee_link: "end_effector_link"
    move_group_name: "arm"
    ik_link_name: "end_effector_link"

    joint_jog_topic: "/servo_node/delta_joint_cmds"
    trajectory_action_name: "/arm_controller/follow_joint_trajectory"
    gripper_action_name: "/gripper_controller/gripper_cmd"
    gripper_open_position: 0.020
    gripper_closed_position: -0.010
    gripper_motion_tolerance: 0.002
    gripper_settle_sec: 0.45
    auto_start_servo: true

    world_name: "default"
    cube_name: "finalproj_cube"
    cube_x: 0.22
    cube_y: 0.0
    cube_z: 0.020
    pick_pregrasp_z: 0.13
    pick_grasp_z: 0.035

    recording_file: "~/.ros/finalproj_openmanipulator_recordings.json"

    button_open_gripper: 4
    button_close_gripper: 5
    button_record_joint: -1
    button_record_ee: -1
    button_play_joint_pose: 11
    button_toggle_pick_task: 10
    button_save_motion: 6
    button_play_all_motions: -1
    button_go_home: 7
    button_toggle_dance: 9
    button_play_joint_motion: 12
    button_play_ee_pose: -1
    button_play_ee_sequence: -1
    button_print_status: 8
